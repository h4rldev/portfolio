version: 0.1
cli:
  version: 1.17.1
plugins:
  sources:
    - id: trunk
      ref: v1.2.6
      uri: https://github.com/trunk-io/plugins
runtimes:
  enabled:
    - node@20.8.1
    - python@3.10.8
lint:
  enabled:
    - actionlint@1.6.26
    - yamllint@1.32.0
    - checkov@2.5.9
    - clippy@1.73.0
    - git-diff-check
    - markdownlint@0.37.0
    - osv-scanner@1.4.1
    - oxipng@9.0.0
    - prettier@3.0.3
    - rustfmt@1.73.0
    - taplo@0.8.1
    - trivy@0.46.0
    - trufflehog@3.60.0
actions:
  disabled:
    - trunk-announce
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
  enabled:
    - trunk-upgrade-available
