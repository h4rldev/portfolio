permissions:
  actions: write
  checks: write
  deployments: write
  packages: write
  pages: write
  contents: write
  id-token: write
  issues: none
  discussions: none
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write

name: Build Yew.rs page and deploy to Github Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main 🛎️
        uses: actions/checkout@v4.0.0
        with:
          ref: main
          path: main
          persist-credentials: false

      - name: Checkout pages 🛎️
        uses: actions/checkout@v4.0.0
        with:
          ref: pages
          path: pages

      - name: Enter main
        run: cd main

      - name: Install Rust 🦀
        uses: actions-rs/toolchain@v1.0.6
        with:
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
          components: rustfmt, clippy

      - name: Install Trunk 🧰
        uses: jetli/trunk-action@v0.4.0
        with:
          version: latest

      - name: Build with Trunk 🏗️
        run: |
          trunk build --release

      - name: Setup Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global advice.addIgnoredFile

      - name: Move contents to branch
        run: |
          mv dist/* ../pages/
          cd ../pages
          ls -la
          git pull
          git add -f .
          git commit -m "Move /dist contents to pages branch"

      - name: Push to pages branch
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: pages
